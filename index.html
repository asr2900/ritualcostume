<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RitualCostume — Avatar Lab</title>
<link rel="stylesheet" href="style.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="ritual-bg-noise"></div>

  <header class="site-header">
    <span class="logo-frame">
      <!-- Ganti file assets/logo/logo.png dengan logo aslimu, nama file
           harus tetap "logo.png" supaya tidak perlu edit HTML ini. -->
      <img src="assets/logo/logo.png" alt="RitualCostume logo" class="logo-img" />
    </span>
    <span class="wordmark">RITUAL<span class="wordmark-thin">COSTUME</span></span>
    <span class="tagline">avatar lab</span>
  </header>

  <main class="lab">

    <!-- KIRI: preview avatar -->
    <section class="stage" aria-label="Avatar preview">
      <div class="stage-frame">
        <div class="stage-ring" aria-hidden="true"></div>

        <!-- 4 kucing hitam berlari mengelilingi avatar -->
        <div class="cat-runners" aria-hidden="true">
          <div class="cat-track cat-track-1"><span class="cat-pos cat-pos-1"><svg class="cat-svg" viewBox="0 0 64 40"><use href="#cat-run"/></svg></span></div>
          <div class="cat-track cat-track-2"><span class="cat-pos cat-pos-2"><svg class="cat-svg" viewBox="0 0 64 40"><use href="#cat-run"/></svg></span></div>
          <div class="cat-track cat-track-3"><span class="cat-pos cat-pos-3"><svg class="cat-svg" viewBox="0 0 64 40"><use href="#cat-run"/></svg></span></div>
          <div class="cat-track cat-track-4"><span class="cat-pos cat-pos-4"><svg class="cat-svg" viewBox="0 0 64 40"><use href="#cat-run"/></svg></span></div>
        </div>

        <canvas id="avatarCanvas" width="600" height="600"></canvas>
      </div>

      <div class="stage-actions">
        <button id="downloadBtn" class="btn btn-primary">Download JPG</button>
        <button id="shareBtn" class="btn btn-ghost">Share to X</button>
      </div>

      <button id="mintBtn" class="btn btn-mint" disabled>
        Mint as proof of presence (coming soon)
      </button>
    </section>

    <!-- KANAN: panel kontrol kostum -->
    <section class="controls" aria-label="Choose your costume">
      <div class="tabs" id="categoryTabs"></div>

      <div class="swatch-scroll-wrap">
        <button class="scroll-btn scroll-left" id="scrollLeftBtn" aria-label="Scroll left">‹</button>
        <div class="swatch-strip" id="swatchStrip"></div>
        <button class="scroll-btn scroll-right" id="scrollRightBtn" aria-label="Scroll right">›</button>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <p>step by step, build your own character.</p>
  </footer>

  <!-- Definisi bentuk kucing lari, dipakai ulang 4x lewat <use> di atas -->
  <svg width="0" height="0" style="position:absolute">
    <symbol id="cat-run" viewBox="0 0 64 40">
      <g fill="#0a0a0a">
        <ellipse cx="30" cy="22" rx="18" ry="9"/>
        <circle cx="50" cy="14" r="8"/>
        <polygon points="44,9 47,1 50,9"/>
        <polygon points="52,9 55,1 58,9"/>
        <path d="M13 20 C4 16, 2 8, 8 4 C 6 12, 10 17, 15 19 Z"/>
        <rect x="14" y="27" width="5" height="10" rx="2" class="leg leg-a"/>
        <rect x="24" y="27" width="5" height="10" rx="2" class="leg leg-b"/>
        <rect x="34" y="27" width="5" height="10" rx="2" class="leg leg-a"/>
        <rect x="42" y="27" width="5" height="10" rx="2" class="leg leg-b"/>
      </g>
    </symbol>
  </svg>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
